<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TNB Bill Calculator</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:#f2f2f7;
padding:16px;
max-width:430px;
margin:auto;
color:#111827;
}

.card{
background:white;
border-radius:28px;
padding:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
font-size:30px;
font-weight:700;
margin:0;
}

.subtitle{
margin-top:4px;
margin-bottom:26px;
font-size:15px;
color:#6b7280;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:600;
}

input,select{
width:100%;
height:56px;
padding:0 16px;
border:none;
border-radius:18px;
background:#f3f4f6;
font-size:18px;
margin-bottom:18px;
box-sizing:border-box;
appearance:none;
-webkit-appearance:none;
}

button{
width:100%;
height:58px;
border:none;
border-radius:20px;
background:#00B1A9;
color:white;
font-size:20px;
font-weight:700;
margin-top:4px;
}

.result{
margin-top:24px;
padding:26px;
border-radius:24px;
background:linear-gradient(135deg,#00B1A9,#2dd4cb);
text-align:center;
color:white;
}

.result-title{
font-size:15px;
opacity:0.95;
}

.result-amount{
font-size:48px;
font-weight:800;
margin-top:8px;
letter-spacing:-1px;
}

.toggle{
margin-top:18px;
text-align:center;
font-size:16px;
font-weight:600;
color:#00B1A9;
cursor:pointer;
}

.details{
display:none;
margin-top:18px;
background:#f9fafb;
border-radius:22px;
padding:18px;
}

.details.show{
display:block;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #e5e7eb;
font-size:15px;
}

.row:last-child{
border-bottom:none;
}

</style>
</head>

<body>

<div class="card">

<h1>TNB Bill</h1>
<div class="subtitle">1 July 2025 Tariff Calculator</div>

<label>Penggunaan (kWh)</label>
<input
type="number"
inputmode="decimal"
pattern="[0-9]*"
id="usage"
value="0">

<label>Penjanaan Solar (kWh)</label>
<input
type="number"
inputmode="decimal"
pattern="[0-9]*"
id="generation"
value="0">

<label>AFA (sen/kWh)</label>
<input
type="text"
id="afa"
value="0"
placeholder="-0.47">

<label>Tempoh Bil</label>
<select id="period">
<option value="ge28">≥ 28 Hari</option>
<option value="lt28">< 28 Hari</option>
</select>

<button onclick="calculateBill()">
Calculate Bill
</button>

<div class="result">
<div class="result-title">Jumlah Bil TNB</div>
<div class="result-amount">
RM <span id="bill">0.00</span>
</div>
</div>

<div class="toggle" onclick="toggleDetails()">
Show Details
</div>

<div class="details" id="details">

<div class="row">
<span>Tenaga</span>
<span id="d1">0.00</span>
</div>

<div class="row">
<span>AFA</span>
<span id="d2">0.00</span>
</div>

<div class="row">
<span>Kapasiti</span>
<span id="d3">0.00</span>
</div>

<div class="row">
<span>Rangkaian</span>
<span id="d4">0.00</span>
</div>

<div class="row">
<span>Retail</span>
<span id="d5">0.00</span>
</div>

<div class="row">
<span>Service Tax</span>
<span id="d6">0.00</span>
</div>

<div class="row">
<span>KWTBB</span>
<span id="d7">0.00</span>
</div>

</div>

</div>

<script>

function toggleDetails(){

const details=document.getElementById('details');

details.classList.toggle('show');

}

function calculateBill(){

const usage=parseFloat(document.getElementById('usage').value)||0;

const generation=parseFloat(document.getElementById('generation').value)||0;

const afa=parseFloat(document.getElementById('afa').value)||0;

const tenaga=usage*0.2703;

const afaCharge=(afa/100)*usage;

const kapasiti=usage*0.0455;

const rangkaian=usage*0.1285;

const retail=usage>600?10:0;

const st=
usage>600
?(tenaga+afaCharge+kapasiti+rangkaian+retail)*0.08
:0;

const kwtbb=
usage>300
?(tenaga+kapasiti+rangkaian)*0.016
:0;

const nem=-0.4443*generation;

let total=
tenaga+
afaCharge+
kapasiti+
rangkaian+
retail+
st+
kwtbb+
nem;

if(total<0){
total=0;
}

document.getElementById('bill').innerText=
total.toFixed(2);

document.getElementById('d1').innerText=
tenaga.toFixed(2);

document.getElementById('d2').innerText=
afaCharge.toFixed(2);

document.getElementById('d3').innerText=
kapasiti.toFixed(2);

document.getElementById('d4').innerText=
rangkaian.toFixed(2);

document.getElementById('d5').innerText=
retail.toFixed(2);

document.getElementById('d6').innerText=
st.toFixed(2);

document.getElementById('d7').innerText=
kwtbb.toFixed(2);

}

calculateBill();

</script>

</body>
</html>
