<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TNB Bill Calculator</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f3f5f7;
        color: #1f2937;
    }

    .card {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        background: white;
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 1.4rem;
        text-align: center;
    }

    .field {
        margin-bottom: 16px;
    }

    label {
        display: block;
        margin-bottom: 7px;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .input-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    input, select {
        width: 100%;
        padding: 12px 14px;
        font-size: 1rem;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        background: #fff;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #00b1a9;
        box-shadow: 0 0 0 3px rgba(0,177,169,0.15);
    }

    .unit {
        min-width: 70px;
        font-size: 0.9rem;
        color: #6b7280;
        text-align: right;
    }

    .result {
        margin-top: 24px;
        padding: 18px;
        border-radius: 14px;
        background: #00b1a9;
        color: white;
        text-align: center;
    }

    .result-title {
        font-size: 0.95rem;
        opacity: 0.9;
        margin-bottom: 6px;
    }

    .result-value {
        font-size: 2rem;
        font-weight: 700;
    }

    .note {
        margin-top: 18px;
        font-size: 0.78rem;
        color: #6b7280;
        line-height: 1.5;
    }

    @media (max-width: 430px) {
        body {
            padding: 14px;
        }

        .card {
            padding: 18px;
        }

        .result-value {
            font-size: 1.8rem;
        }
    }
</style>
</head>
<body>

<div class="card">
    <h1>TNB Bill Calculator</h1>

    <div class="field">
        <label for="usage">Jumlah penggunaan</label>
        <div class="input-group">
            <input type="number" id="usage" inputmode="decimal" value="0" step="0.01">
            <div class="unit">kWh</div>
        </div>
    </div>

    <div class="field">
        <label for="generation">Jumlah penjanaan</label>
        <div class="input-group">
            <input type="number" id="generation" inputmode="decimal" value="0" step="0.01">
            <div class="unit">kWh</div>
        </div>
    </div>

    <div class="field">
        <label for="afa">AFA</label>
        <div class="input-group">
            <input type="text" id="afa" value="-0.47">
            <div class="unit">sen/kWh</div>
        </div>
    </div>

    <div class="field">
        <label for="period">Tempoh bil</label>
        <select id="period">
            <option value="ge28">≥28 hari</option>
            <option value="lt28">&lt;28 hari</option>
        </select>
    </div>

    <div class="result">
        <div class="result-title">Caj semasa (RM)</div>
        <div class="result-value" id="bill">0.00</div>
    </div>

    <div class="note">
        Calculator based on the spreadsheet provided. Hidden intermediate calculations are processed automatically.
    </div>
</div>

<script>
function round2(num) {
    return Math.round((num + Number.EPSILON) * 100) / 100;
}

function getIncentiveRate(kwh) {
    if (kwh <= 200) return -25;
    if (kwh <= 250) return -24.5;
    if (kwh <= 300) return -22.5;
    if (kwh <= 350) return -21;
    if (kwh <= 400) return -17;
    if (kwh <= 450) return -14.5;
    if (kwh <= 500) return -12;
    if (kwh <= 550) return -10.5;
    if (kwh <= 600) return -9;
    if (kwh <= 650) return -7.5;
    if (kwh <= 700) return -5.5;
    if (kwh <= 750) return -4.5;
    if (kwh <= 800) return -4;
    if (kwh <= 850) return -2.5;
    if (kwh <= 900) return -1;
    if (kwh <= 1000) return -0.5;
    return 0;
}

function calculateBill() {
    const usage = parseFloat(document.getElementById('usage').value) || 0;
    const generation = parseFloat(document.getElementById('generation').value) || 0;
    const afa = parseFloat(document.getElementById('afa').value) || 0;
    const period = document.getElementById('period').value;

    const withoutST = period === 'lt28' ? 0 : Math.min(usage, 600);
    const withST = period === 'lt28' ? usage : Math.max(usage - 600, 0);

    const nemCreditKwh = Math.min(generation, usage);

    const tenaga = 0.2703 * usage;

    const afaCharge = usage > 600
        ? round2((afa / 100) * withoutST) + round2((afa / 100) * withST)
        : 0;

    const kapasiti = round2(0.0455 * usage);
    const rangkaian = round2(0.1285 * usage);

    const retail = usage > 600 ? 10 : 0;

    const incentiveRate = getIncentiveRate(usage);
    const incentive = round2((incentiveRate / 100) * usage);

    const currentUsageCharge =
        tenaga +
        afaCharge +
        kapasiti +
        rangkaian +
        retail +
        incentive;

    const serviceTax = round2((0.2703 * withST +
                               round2((afa / 100) * withST) +
                               round2(0.0455 * withST) +
                               round2(0.1285 * withST) +
                               retail +
                               round2((incentiveRate / 100) * withST)
                              ) * 0.08);

    const kwtbb = usage > 300
        ? (tenaga + kapasiti + rangkaian + incentive) * 0.016
        : 0;

    const nemCredits =
        (-0.2703 * nemCreditKwh) +
        (-0.0455 * nemCreditKwh) +
        (-0.1285 * nemCreditKwh) +
        ((incentiveRate / 100) * -1 * nemCreditKwh);

    let total = currentUsageCharge + serviceTax + kwtbb + nemCredits;

    total = total < 0 ? 0 : total;

    document.getElementById('bill').innerText = total.toFixed(2);
}

document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', calculateBill);
});

calculateBill();
</script>

</body>
</html>
